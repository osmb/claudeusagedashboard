name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true

      - uses: taiki-e/install-action@v2
        with:
          tool: just

      - run: uv sync

      - run: just check
